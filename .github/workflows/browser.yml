name: Browser tests (Pest)

# Runs on PRs into main and on main itself, so main is always browser-green and any
# release tag cut from it is safe. (Not on every feature-branch push — only what's
# heading into main.) Can also be dispatched manually.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  browser:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: sqlite3, pdo_sqlite, mbstring, bcmath
          coverage: none

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install PHP dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install front-end deps & Playwright
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Build front-end
        run: npm run build

      # Pest serves the app in-process and uses the testing :memory: database (phpunit.xml),
      # so no separate server or database setup is needed.
      - name: Run browser tests
        run: ./vendor/bin/pest tests/Browser

      - name: Upload failure screenshots
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: pest-browser-screenshots
          path: tests/Browser/Screenshots
          if-no-files-found: ignore
