name: Release

# Build & publish a multi-arch image to GHCR on a CalVer tag (e.g. 2026.06.28 or 2026.06.28.1).
on:
  push:
    tags:
      - "20[0-9][0-9].[0-1][0-9].*"
  # Manual build-only run to validate the image on real runners (no push).
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    # One native runner per arch (no QEMU). The NAS is likely arm64.
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase image name (GHCR rejects mixed case)
        id: img
        run: echo "name=$(echo "$REGISTRY/$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            APP_VERSION=${{ github.ref_name }}
            APP_COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          # Tag push → push by digest. Manual dispatch → build only (validate).
          outputs: ${{ github.event_name == 'push' && format('type=image,name={0},push-by-digest=true,name-canonical=true,push=true', steps.img.outputs.name) || '' }}

      - name: Export digest
        if: github.event_name == 'push'
        run: |
          mkdir -p /tmp/digests
          touch "/tmp/digests/${{ steps.build.outputs.digest }}"

      - name: Upload digest
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Lowercase image name
        id: img
        run: echo "name=$(echo "$REGISTRY/$IMAGE_NAME" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compose per-arch digests into one manifest (tag + latest)
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t ${{ steps.img.outputs.name }}:${{ github.ref_name }} \
            -t ${{ steps.img.outputs.name }}:latest \
            $(printf '${{ steps.img.outputs.name }}@%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.img.outputs.name }}:${{ github.ref_name }}
