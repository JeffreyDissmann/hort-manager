# Slack app manifest for Hort-Manager (production: your-domain.example).
#
# Create the app: https://api.slack.com/apps → Create New App → From a manifest →
# pick your workspace → paste this YAML.
#
# NOTE: Event Subscriptions are intentionally omitted. Slack verifies that URL at
# creation by POSTing a signed challenge, but the app's signing secret isn't in
# your .env yet. Add it AFTER installing + setting SLACK_SIGNING_SECRET + restart:
#   Event Subscriptions → Enable → Request URL:
#     https://your-domain.example/slack/events
#   → Subscribe to bot events → app_home_opened AND message.im → Save.
# (message.im delivers the parent's DMs to the assistant; it needs the im:history
#  scope below. Reinstall the app afterwards.)
#
# If your domain differs, replace your-domain.example throughout.

display_information:
  name: Hort-Manager
  description: Wann und wie geht jedes Kind nach Hause – plus Ausflüge.
  background_color: "#223e55"

features:
  bot_user:
    display_name: Hort-Manager
    always_online: true
  app_home:
    home_tab_enabled: true
    # Must be enabled for the bot to DM users (departures, RSVPs). With this off,
    # chat.postMessage fails: messages_tab_disabled. NOT read-only, so parents can
    # type to the assistant (krank/Abholzeit/RSVP/questions) — needs im:history.
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  slash_commands:
    - command: /hort
      url: https://your-domain.example/slack/commands
      description: Hort-Manager öffnen
      should_escape: false

oauth_config:
  redirect_urls:
    - https://your-domain.example/auth/slack/callback
  scopes:
    bot:
      - chat:write
      - commands
      - im:history # receive parents' DMs so the assistant can read them
      - users:read
      - users:read.email

settings:
  interactivity:
    is_enabled: true
    request_url: https://your-domain.example/slack/interactions
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
